version: '3.8'

services:
  hello-world:
    # La imagen debe apuntar a TU registro local
    image: registry.br-ainiac.net/hello-world:latest
    networks:
      - proxy-cluster-docker
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        # Cambia esto por el subdominio que quieras probar
        - "traefik.http.routers.hello.rule=Host(`hello.br-ainiac.net`)"
        - "traefik.http.routers.hello.entrypoints=websecure"
        - "traefik.http.routers.hello.tls.certresolver=letsencrypt"
        - "traefik.http.services.hello.loadbalancer.server.port=80"
        - "traefik.docker.network=proxy-cluster-docker"

networks:
  proxy-cluster-docker:
    external: true
